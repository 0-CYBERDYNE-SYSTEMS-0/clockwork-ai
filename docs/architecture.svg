<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .title { font-size: 32px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 15px; fill: #6b7280; }
      .zone-label { font-size: 13px; font-weight: 600; letter-spacing: 1.5px; }
      .box-label { font-size: 15px; font-weight: 600; fill: #1f2937; }
      .box-label-sm { font-size: 13px; font-weight: 500; fill: #374151; }
      .box-label-lg { font-size: 16px; font-weight: 600; fill: #1f2937; }
      .arrow-label { font-size: 11px; fill: #9ca3af; }
      .footer-label { font-size: 13px; font-weight: 500; }
      .badge-text { font-size: 11px; font-weight: 500; fill: #6b7280; }
      
      @media (prefers-color-scheme: dark) {
        .title { fill: #f9fafb; }
        .subtitle { fill: #9ca3af; }
        .box-label { fill: #f3f4f6; }
        .box-label-sm { fill: #d1d5db; }
        .box-label-lg { fill: #f9fafb; }
        .arrow-label { fill: #6b7280; }
        .footer-label { fill: #d1d5db; }
        .badge-text { fill: #9ca3af; }
        text.dm-bg { fill: #111827; }
      }
    </style>
    
    <!-- Zone gradients -->
    <linearGradient id="gradInput" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#dbeafe" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="gradCore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ede9fe" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="gradOutput" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecfdf5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d1fae5" stop-opacity="0.5"/>
    </linearGradient>
    
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06"/>
    </filter>
    <filter id="shadowLight" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.04"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1400" height="820" fill="#ffffff" class="dm-bg"/>
  
  <!-- ===== TITLE ===== -->
  <text x="700" y="38" text-anchor="middle" class="title">Clockwork AI</text>
  <text x="700" y="62" text-anchor="middle" class="subtitle">Agent-Native Calendar Reasoning — Architecture</text>
  
  <!-- ===== BACKGROUND ZONES ===== -->
  <!-- Input zone -->
  <rect x="28" y="88" width="310" height="600" rx="10" fill="url(#gradInput)" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="183" y="112" text-anchor="middle" class="zone-label" fill="#3b82f6">INPUT</text>
  <rect x="155" y="100" width="56" height="18" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="183" y="113" text-anchor="middle" font-size="10" fill="#2563eb" font-weight="600">CLI · MCP · API</text>
  
  <!-- Core zone -->
  <rect x="365" y="88" width="670" height="600" rx="10" fill="url(#gradCore)" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="700" y="112" text-anchor="middle" class="zone-label" fill="#7c3aed">CORE ENGINE</text>
  <rect x="646" y="100" width="108" height="18" rx="4" fill="#ede9fe" stroke="#c4b5fd" stroke-width="0.5"/>
  <text x="700" y="113" text-anchor="middle" font-size="10" fill="#6d28d9" font-weight="600">@clockwork-ai/core</text>
  
  <!-- Output zone -->
  <rect x="1062" y="88" width="310" height="600" rx="10" fill="url(#gradOutput)" stroke="#a7f3d0" stroke-width="1.5"/>
  <text x="1217" y="112" text-anchor="middle" class="zone-label" fill="#059669">OUTPUT</text>
  <rect x="1180" y="100" width="74" height="18" rx="4" fill="#d1fae5" stroke="#6ee7b7" stroke-width="0.5"/>
  <text x="1217" y="113" text-anchor="middle" font-size="10" fill="#047857" font-weight="600">.ics · JSON · Git</text>
  
  <!-- ===== INPUT BOXES ===== -->
  <rect x="58" y="150" width="250" height="56" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="183" y="182" text-anchor="middle" class="box-label">CLI</text>
  
  <rect x="58" y="232" width="250" height="56" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="183" y="264" text-anchor="middle" class="box-label">MCP Server</text>
  
  <rect x="58" y="314" width="250" height="56" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="183" y="346" text-anchor="middle" class="box-label">Library / Agent API</text>
  
  <!-- ===== CORE ENGINE BOXES ===== -->
  
  <!-- Row 1: ICS Pipeline -->
  <rect x="390" y="148" width="165" height="54" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="472" y="179" text-anchor="middle" class="box-label-sm">ICS Tokenizer</text>
  
  <line x1="560" y1="175" x2="585" y2="175" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)"/>
  
  <rect x="593" y="148" width="165" height="54" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="675" y="179" text-anchor="middle" class="box-label-sm">ICS Parser</text>
  
  <line x1="763" y1="175" x2="788" y2="175" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)"/>
  
  <rect x="796" y="148" width="165" height="54" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="878" y="179" text-anchor="middle" class="box-label-sm">ICS Serializer</text>
  
  <!-- Row 2: RRULE Engine -->
  <rect x="390" y="232" width="571" height="56" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="675" y="255" text-anchor="middle" class="box-label-lg">RRULE Engine</text>
  <text x="675" y="274" text-anchor="middle" font-size="12" fill="#7c3aed">Parse · Expand · Validate — RFC 5545 §3.3.10</text>
  
  <!-- Row 3: Conflict + Safety -->
  <rect x="390" y="318" width="265" height="56" rx="8" fill="#ffffff" stroke="#fbbf24" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="522" y="350" text-anchor="middle" class="box-label-lg">Conflict Detector</text>
  
  <rect x="686" y="318" width="275" height="56" rx="8" fill="#ffffff" stroke="#f87171" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="823" y="350" text-anchor="middle" class="box-label-lg">Safety Layer</text>
  <text x="823" y="365" text-anchor="middle" font-size="11" fill="#ef4444">Scope Limiter + Transaction Manager</text>
  
  <!-- Row 4: Query + Timezone -->
  <rect x="390" y="404" width="265" height="56" rx="8" fill="#ffffff" stroke="#60a5fa" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="522" y="436" text-anchor="middle" class="box-label-lg">Query Engine</text>
  <text x="522" y="451" text-anchor="middle" font-size="11" fill="#3b82f6">Composable Filters</text>
  
  <rect x="686" y="404" width="275" height="56" rx="8" fill="#ffffff" stroke="#34d399" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="823" y="436" text-anchor="middle" class="box-label-lg">Timezone Handler</text>
  <text x="823" y="451" text-anchor="middle" font-size="11" fill="#059669">VTIMEZONE · DST · UTC</text>
  
  <!-- Down arrows between core rows -->
  <line x1="675" y1="202" x2="675" y2="228" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="675" y1="288" x2="675" y2="314" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="560" y1="374" x2="560" y2="400" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="4,3"/>
  
  <!-- ===== OUTPUT BOXES ===== -->
  <rect x="1092" y="175" width="250" height="60" rx="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="1217" y="205" text-anchor="middle" class="box-label">.ics Files</text>
  <text x="1217" y="222" text-anchor="middle" font-size="11" fill="#059669">RFC 5545 Compliant</text>
  
  <rect x="1092" y="275" width="250" height="60" rx="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="1217" y="305" text-anchor="middle" class="box-label">JSON</text>
  <text x="1217" y="322" text-anchor="middle" font-size="11" fill="#059669">Structured Export</text>
  
  <rect x="1092" y="375" width="250" height="60" rx="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="1217" y="405" text-anchor="middle" class="box-label">Git Versioned</text>
  <text x="1217" y="422" text-anchor="middle" font-size="11" fill="#059669">Auditable · Diffable</text>
  
  <!-- ===== ARROWS BETWEEN ZONES ===== -->
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d1d5db"/>
    </marker>
  </defs>
  
  <!-- Input → Core arrows -->
  <line x1="312" y1="178" x2="386" y2="178" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="312" y1="260" x2="386" y2="260" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="312" y1="342" x2="386" y2="342" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>
  
  <!-- Core → Output arrows -->
  <line x1="965" y1="200" x2="1088" y2="200" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="965" y1="305" x2="1088" y2="305" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="965" y1="405" x2="1088" y2="405" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- ===== STATUS BADGES (top right corner of diagram) ===== -->
  <rect x="1185" y="20" width="58" height="22" rx="11" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="1214" y="35" text-anchor="middle" font-size="11" fill="#059669" font-weight="600">v0.1.0</text>
  
  <rect x="1250" y="20" width="112" height="22" rx="11" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="1306" y="35" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">159 Tests · 0 Fail</text>
  
  <!-- ===== FOOTER: EXTENSIONS ===== -->
  <rect x="28" y="722" width="1344" height="42" rx="8" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="700" y="748" text-anchor="middle" class="footer-label" fill="#0f766e">
    <tspan font-weight="700" fill="#0d9488">EXTENSIONS</tspan>
    <tspan fill="#6b7280">  ▸  Agrical —</tspan>
    <tspan fill="#374151"> planting</tspan>
    <tspan fill="#6b7280"> · </tspan>
    <tspan fill="#374151">scouting</tspan>
    <tspan fill="#6b7280"> · </tspan>
    <tspan fill="#374151">chemical</tspan>
    <tspan fill="#6b7280"> · </tspan>
    <tspan fill="#374151">equipment</tspan>
    <tspan fill="#6b7280"> · </tspan>
    <tspan fill="#374151">compliance</tspan>
    <tspan fill="#6b7280">  +  plugin model (X-CLOCKWORK-*)</tspan>
  </text>
  
  <!-- ===== FOOTER: SAFETY ===== -->
  <rect x="28" y="772" width="1344" height="36" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="700" y="795" text-anchor="middle" class="footer-label">
    <tspan font-weight="700" fill="#a16207">SAFETY GUARANTEES</tspan>
    <tspan fill="#6b7280">  ▸  </tspan>
    <tspan fill="#374151">Dry-Run by Default</tspan>
    <tspan fill="#d1d5db">  ·  </tspan>
    <tspan fill="#374151">Scope Limited</tspan>
    <tspan fill="#d1d5db">  ·  </tspan>
    <tspan fill="#374151">Conflict-Aware</tspan>
    <tspan fill="#d1d5db">  ·  </tspan>
    <tspan fill="#374151">Transaction TTL</tspan>
    <tspan fill="#d1d5db">  ·  </tspan>
    <tspan fill="#374151">RFC 5545 Compliant</tspan>
  </text>
  
  <!-- ===== VERTICAL FLOW INDICATORS (subtle) ===== -->
  <text x="183" y="420" text-anchor="middle" font-size="12" fill="#9ca3af">↓  Agent sends  ↓</text>
  <text x="183" y="437" text-anchor="middle" font-size="12" fill="#9ca3af">calendar intent</text>
  
  <text x="1217" y="480" text-anchor="middle" font-size="12" fill="#9ca3af">↑  ICS output  ↑</text>
  <text x="1217" y="497" text-anchor="middle" font-size="12" fill="#9ca3af">git-versionable</text>
  
</svg>